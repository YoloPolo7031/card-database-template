<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Riftbound Card Inventory</title>
</head>
<body>
    <div class="">
        <div class="container hero">
            <div class="row d-flex align-items-center justify-content-center pt-5">
                <div class="col-12">
                    <h1 class="text-center share-tech-regular">Riftbound Card Inventory</h1>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="row d-flex align-items-center justify-content-center pt-3">
                <div class="btn-group flex-wrap filter-buttons" role="group">
                    <button type="button" class="btn btn-outline-primary filter-button active" data-filter="All">All</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Legend">Legend</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Unit">Unit</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Rune">Rune</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Spell">Spell</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Gear">Gear</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Battlefield">Battlefield</button>
                    <button type="button" class="btn btn-outline-primary filter-button" data-filter="Token">Token</button>
                </div>
            </div>
        </div>

        <div class="container text-center mt-3">
            <h6 id="totalCardCount" class="share-tech-regular-v2">Total Cards: 0</h6>
        </div>

        <div class="container text-center">
            <input class="form-control w-75 mx-auto searchBar" type="search" placeholder="Search by card name or set number">
        </div>

        <div id="cardList" class="container pt-5">
            <div id="cardRow" class="row justify-content-center g-4"></div>
        </div>
        <p id="noResults" class="text-center mt-4" style="display: none;">No results found.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
